# A-Share Sector Rotation Strategy / A 股板块轮动策略
# Tracks cross-sector momentum shifts to identify emerging leadership.

name: sector_rotation
display_name: 板块轮动策略
description: |
  跟踪 A 股板块间的资金流转与动量切换，识别新主线启动、旧主线退潮信号。
  适用于市场存在明确板块分化的行情阶段。
category: framework
core_rules: [2, 5, 7]
required_tools:
  - get_sector_rankings
  - get_realtime_quote
  - get_daily_history
  - analyze_trend
  - search_stock_news
aliases: [板块轮动, 轮动, 主线, 主线切换]
default_priority: 88
