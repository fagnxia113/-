instructions: |
  **板块轮动策略（Sector Rotation Strategy）**

  A 股市场板块轮动极为频繁（通常 3~7 天一轮），核心驱动力是政策催化 + 资金博弈。
  本策略从板块层面自上而下判断个股所处的轮动阶段。

  ## 第一步：板块强度排名

  使用 `get_sector_rankings` 获取当前板块涨跌榜：

  1. **领涨板块 Top 5**：记录板块名称、涨跌幅
  2. **领跌板块 Top 5**：记录板块名称、涨跌幅
  3. **判断个股所在板块位置**：
     - 在 Top 5 领涨 → 主线板块，关注是否可持续
     - 在 Top 5 领跌 → 退潮板块，规避
     - 在中间位置 → 中性，需看个股自身表现

  ## 第二步：板块持续性判断

  使用 `get_daily_history` 结合 `analyze_trend` 做 3~5 日回溯：

  1. **连续领涨判断**：
     - 板块连续 2 天在 Top 5 → 初步确认主线
     - 板块连续 3 天在 Top 3 → 强主线，可重点参与
     - 板块突然首日进入 Top 5 → 新启动，关注催化剂

  2. **轮动节奏识别**：
     - 领涨板块频繁更换（每天不同）→ 无主线，控制仓位
     - 领涨板块稳定（连续 3 日以上）→ 有主线，顺势参与
     - 旧主线退出 Top 5 同时新主线出现 → 切换信号

  ## 第三步：催化剂与政策分析

  使用 `search_stock_news` 搜索板块级新闻：

  1. **政策催化**：
     - 国务院/发改委/工信部等出台行业政策 → 强催化，板块持续性好
     - 地方政策或企业层面消息 → 中等催化，可能仅一日游
     - 无明确催化纯资金驱动 → 弱催化，持续性差

  2. **事件催化**：
     - 行业技术突破、标志性订单 → 可能开启新主线
     - 自然灾害、安全事故 → 短期应激，不宜追高

  ## 第四步：个股在板块中的地位

  使用 `get_realtime_quote` 对比个股与板块表现：

  1. **龙头判定**：个股涨幅 > 板块平均涨幅 × 1.5 → 板块龙头
  2. **跟风判定**：个股涨幅 ≈ 板块平均涨幅 → 跟风股，需龙头不倒才安全
  3. **补涨判定**：个股涨幅 < 板块平均涨幅但基本面优 → 补涨机会

  ## 第五步：轮动阶段综合判断

  将个股所在板块的轮动阶段分为：

  | 阶段 | 特征 | 策略 |
  |------|------|------|
  | 启动期 | 板块首日领涨，有催化 | 轻仓试探龙头 |
  | 发酵期 | 连续 2~3 日领涨 | 加仓龙头或介入补涨 |
  | 高潮期 | 板块内多股涨停，换手大 | 警惕分歧，不追高 |
  | 退潮期 | 板块退出 Top 5 | 减仓或离场 |
  | 反包期 | 退潮后再次进入 Top 5 | 看龙头是否创新高决定 |

  ## 评分调整

  - 个股在启动期/发酵期的主线板块内且为龙头：sentiment_score +12
  - 个股在发酵期主线板块内且为跟风/补涨：sentiment_score +6
  - 个股在高潮期主线板块内：sentiment_score +3，risk_alerts 标注分歧风险
  - 个股在退潮期板块内：sentiment_score -8
  - 无主线（板块频繁轮换）：sentiment_score -3，建议控制仓位
  - 在 `buy_reason` 中注明「板块轮动策略」及所处阶段
  - 在 `sector_position` 字段中写明板块排名和龙头/跟风/补涨定位
