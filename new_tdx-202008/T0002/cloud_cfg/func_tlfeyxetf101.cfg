<?xml version="1.0" encoding="gbk"?>
<root>
	<header title="ETF份额榜(同一类型ETF，筛选份额最大的一只来显示)" note="">
	</header>

	<unit id="1" style="list" fixcol="5" defsort="JLR" firstswitchzst="1" multibreed="1" file="func_tlfeyxetf101_1.jsn">
		<item code="$ZQDM" name="代码" type="8S0" datatype="S" iszqcode="1" halign="L" align="L"/>
		<item code="$SC" name="市场" datatype="I" hide="1" iszqsc="1" halign="L" align="L"/>
		<item code="$ZQJC" name="名称" type="KS0" datatype="S" halign="L" align="L"/>
		<item code="$ZAF" name="涨幅%" type="7Z2" datatype="F" halign="R" align="R"/>
		<item code="$NOW" name="现价" type="7C3" datatype="F" halign="R" align="R"/>
		<item code="$JJJZ" name="IOPV" type="7N4" datatype="F" halign="R" align="R"/>
		<item code="$ZCJJE" name="总金额" type="9A1" datatype="F" halign="R" align="R" />
		<item code="$ZQDM1" name="指数代码" type="BS0" datatype="S" halign="L" align="L" filter="1" />
		<item code="$SC1" name="指数市场" datatype="I" hide="1" halign="L" align="L"/>
		<item code="ZSJC" name="指数简称" syscol="$ZQJC" refzqdm="1" type="ET0" datatype="S" halign="L" align="L" filter="1" />
		<item code="ZSZF" name="涨幅%" type="7" syscol="$ZAF" refzqdm="1" datatype="F" halign="R" align="R"/>	
		<item code="JZRQ" name="截止日期" type="AT0" datatype="S" halign="C" align="C" />
		<item code="YJL" name="溢价率%" type="9Z2" datatype="F" halign="R" align="R" calc="($NOW-$JJJZ)/$JJJZ*100" calcref="$NOW,$JJJZ" />
		<item code="JLR" name="净流入" type="AZ2" datatype="F" halign="R" align="R" fmt="6"/>	
		<item code="ZXFE" name="份额|最新" type="AT2" datatype="F" halign="R" align="R" fmt="6" />		
		<item code="FEBH" name="份额|日变化" type="AZ2" datatype="F" halign="R" align="R" fmt="6"/>
		<item code="ZFEBH" name="份额|周变化" type="CZ2" datatype="F" halign="R" align="R" fmt="6"/>
		<item code="YFEBH" name="份额|月变化" type="CZ2" datatype="F" halign="R" align="R" fmt="6"/>		
		<item code="ZXGM" name="规模|最新" type="AT2" datatype="F" halign="R" align="R" calc="$NOW*ZXFE" calcref="$NOW,ZXFE"  fmt="6"/>
		<item code="GMBH" name="规模|日变化" type="AZ2" datatype="F" halign="R" align="R" calc="$NOW*FEBH" calcref="$NOW,FEBH" fmt="6" />	
		<item code="YZGM" name="规模|一周前" type="CZ2"  hide="1" datatype="F" halign="R" align="R" fmt="6"/>		
		<item code="YYGM" name="规模|一月前" type="CZ2"  hide="1" datatype="F" halign="R" align="R" fmt="6"/>		
		<item code="ZGMBH" name="规模|周变化" type="CZ2" datatype="F" halign="R" align="R" calc="$NOW*ZXFE-YZGM" calcref="$NOW,ZXFE,YZGM" fmt="6" />	
		<item code="YGMBH" name="规模|月变化" type="CZ2" datatype="F" halign="R" align="R" calc="$NOW*ZXFE-YYGM" calcref="$NOW,ZXFE,YYGM" fmt="6" />	
		<item code="ZXSSDW" name="最小申赎单位(万份)" type="HT2" datatype="F" halign="R" align="R" />
	</unit>
</root>